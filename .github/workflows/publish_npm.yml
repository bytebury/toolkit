name: Publish to NPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # The OIDC ID token is used for authentication with NPM.

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: Build NPM package
        run: deno -A scripts/build_npm.ts

      - name: Setup Node.js and npm
        uses: actions/setup-node@v4
        with:
          # Use the current LTS release for publishing; Node 26's bundled npm can
          # fail to resolve npm's optional sigstore dependency during provenance setup.
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Publish to NPM
        run: cd npm && npm publish --access public
