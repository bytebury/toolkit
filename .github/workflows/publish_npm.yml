name: Publish to NPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # The OIDC ID token is used for authentication with NPM.

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: Build NPM package
        run: deno -A scripts/build_npm.ts

      - name: Setup Node.js and npm
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org/

      # Avoid npm@latest provenance regression that fails with MODULE_NOT_FOUND for sigstore.
      - name: Pin npm CLI
        run: npm install -g npm@11.4.2

      - name: Verify npm CLI version
        run: npm --version

      - name: Publish to NPM
        run: cd npm && npm publish --access public
